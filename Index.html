<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EHL Current/Proposed</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ceo:#1a2744;
  --dept:#185FA5;
  --dept-hover:#0C447C;
  --dept-open:#042C53;
  --EMP-W:120px;
  --EMP-H:62px;
  --GRADE-ROW-H:82px;
}
body{font-family:'DM Sans',sans-serif;background:#eef1f8;color:#1a2744;}

.tb{background:var(--ceo);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:54px;}
.tb-title{font-family:'DM Serif Display',serif;font-size:18px;color:#c8d8f4;letter-spacing:.04em;}
.tb-title span{color:#85B7EB;}
.tb-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.btn{background:rgba(255,255,255,.1);color:#e0eafa;border:1px solid rgba(255,255,255,.2);border-radius:7px;padding:5px 13px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:background .15s;}
.btn:hover{background:rgba(255,255,255,.2);}
.btn-green{background:#0F6E56;border-color:#1D9E75;color:#E1F5EE;}
.btn-green:hover{background:#085041;}

.page{padding:24px 20px 60px;max-width:1800px;margin:0 auto;}

/* CEO — no badge, just name + designation */
.ceo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:4px;}
.ceo-box{
  background:var(--ceo);border-radius:12px;
  padding:16px 44px;text-align:center;cursor:pointer;
  min-width:220px;border:2px solid #2d3f6b;
}
.ceo-box .name{font-family:'DM Serif Display',serif;font-size:20px;color:#e0eafa;}
.ceo-box .desig{font-size:11px;color:#85B7EB;margin-top:4px;}
.v-line{width:2px;height:22px;background:#85B7EB;margin:0 auto;}
.h-line{height:2px;background:linear-gradient(to right,transparent 3%,#85B7EB 15%,#85B7EB 85%,transparent 97%);}

/* DEPT BOXES ROW */
.dept-row-wrap{overflow-x:auto;padding-bottom:15px;}
.dept-row{display:flex;gap:0;align-items:flex-start;min-width:max-content;justify-content:center;}
.dept-col{display:flex;flex-direction:column;align-items:center;min-width:120px;}
.dept-vline{width:2px;height:20px;background:#85B7EB;}
.dept-box{
  background:var(--dept);color:#fff;border-radius:9px;
  padding:10px 12px 8px;
  width:110px;height:80px;
  text-align:center;cursor:pointer;user-select:none;
  transition:background .15s,transform .12s;
  border:2px solid transparent;position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}

.dept-box.current{
    background:#185FA5;   /* Blue */
}

.dept-box.proposed{
    background: #DC4D01;
}

.dept-box:hover{background:var(--dept-hover);transform:translateY(-2px);}
.dept-box.open{background:var(--dept-open);border-color:#85B7EB;}
.dept-box .dn{font-size:10px;font-weight:600;color:#e0eafa;line-height:1.3;}
.dept-box .dc{font-size:9px;color:#85B7EB;margin-top:2px;}
.dept-box .chev{
  position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);
  width:16px;height:16px;background:var(--dept);border:2px solid #85B7EB;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:8px;color:#e0eafa;transition:transform .2s,background .15s;
}
.dept-box.open .chev{transform:translateX(-50%) rotate(180deg);background:var(--dept-open);}

/* GRID */
.grid-wrap{
  display:flex;margin-top:16px;
  background:#fff;border-radius:12px;
  border:1.5px solid #B5D4F4;overflow:hidden;
}

.grade-labels{
  display:flex;
  flex-direction:column;
  width:56px;
  min-width:56px;
  flex-shrink:0;
  border-right:2px solid #DDE2EE;
}

.grade-top-header{
  height:40px;
  min-height:40px;
  max-height:40px;
  background:linear-gradient(90deg,#042C53,#185FA5);
  border-bottom:1px solid #EBF0F9;
}
.grade-label-cell{
  height:var(--GRADE-ROW-H);min-height:var(--GRADE-ROW-H);max-height:var(--GRADE-ROW-H);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;letter-spacing:.07em;
  border-bottom:1px solid #EBF0F9;
}
.grade-label-cell:last-child{border-bottom:none;}
.gl7{background:#EEEDFE;color:#3C3489;}
.gl6{background:#E1F5EE;color:#085041;}
.gl5{background:#FAEEDA;color:#633806;}
.gl4{background:#FAECE7;color:#712B13;}
.gl3{background:#E6F1FB;color:#0C447C;}
.gl2{background:#FBEAF0;color:#72243E;}
.gl1{background:#EAF3DE;color:#27500A;}

.dept-panels-area{flex:1;overflow-x:auto;}
.dept-panels-row{display:flex;height:100%;}

.dept-panel{
  border-left:1px solid #EBF0F9;
  min-width:0;overflow:hidden;
  transition:min-width .25s;
}
.dept-panel.closed{min-width:0;max-width:0;border-left:none;}
.dept-panel.open{min-width:200px;}

.dept-panel-header{
  background:linear-gradient(90deg,var(--dept-open),var(--dept));
  color:#fff;padding:8px 14px;
  display:flex;justify-content:space-between;align-items:center;
  height:40px;
  min-height:40px;
  max-height:40px;
}

.dph-name{font-size:12px;font-weight:600;color:#c8d8f4;}
.dph-cnt{font-size:10px;color:#85B7EB;margin-left:6px;}
.dph-close{background:rgba(255,255,255,.15);border:none;color:#c8d8f4;border-radius:5px;padding:2px 7px;cursor:pointer;font-size:11px;}
.dph-close:hover{background:rgba(255,255,255,.28);}

/* GRADE ROWS — fixed height to match label column */
.dept-grade-row{
  height:var(--GRADE-ROW-H);min-height:var(--GRADE-ROW-H);max-height:var(--GRADE-ROW-H);
  display:flex;align-items:center;
  border-bottom:1px solid #EBF0F9;
  padding:0 10px;gap:8px;
  overflow-x:auto;
  flex-wrap:nowrap;
}
.dept-grade-row:last-child{border-bottom:none;}
.dg7{background:#EEEDFE;}
.dg6{background:#E1F5EE;}
.dg5{background:#FAEEDA;}
.dg4{background:#FAECE7;}
.dg3{background:#E6F1FB;}
.dg2{background:#FBEAF0;}
.dg1{background:#EAF3DE;}

/* EMPLOYEE CARDS — all identical size */
.emp-card{
  width:var(--EMP-W);min-width:var(--EMP-W);max-width:var(--EMP-W);
  height:var(--EMP-H);min-height:var(--EMP-H);max-height:var(--EMP-H);
  border-radius:8px;padding:0 10px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;cursor:pointer;flex-shrink:0;
  transition:transform .12s,box-shadow .12s;
  border:1.5px solid transparent;
}
.emp-card:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.16);}
.en{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;}
.ed{font-size:9px;margin-top:3px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;width:100%;}

.gl9{background:#E2D4FF;color:#4B2A9A;}
.gl8{background:#EAE0FF;color:#5A38A8;}

.dg10{background:#D8C5FF;}

.dg8{background:#EAE0FF;}

.ec9{background:#7C52D9;border-color:#5A38A8;}

.ec8{background:#8B63E6;border-color:#6A3FC9;}

.ec7{background:#534AB7;border-color:#3C3489;}
.ec7 .en{color:#EEEDFE;}

.ec4 .ed{color:#F5C4B3;}

.ec3 .en{color:#E6F1FB;}
.ec3 .ed{color:#85B7EB;}
.ec2{background:#993556;border-color:#72243E;}
.ec2 .en{color:#FBEAF0;}
.ec2 .ed{color:#F4C0D1;}
.ec1{background:#3B6D11;border-color:#27500A;}

/* ADD BUTTON — same size as emp card */
.add-btn{
  width:38px;min-width:38px;height:var(--EMP-H);
  border:1.5px dashed #B5D4F4;border-radius:8px;
  background:transparent;color:#B5D4F4;font-size:20px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:border-color .13s,color .13s,background .13s;
}
.add-btn:hover{border-color:#185FA5;color:#185FA5;background:#E6F1FB;}

/* LEGEND */
.legend{display:flex;gap:10px;flex-wrap:wrap;padding:14px 4px 0;align-items:center;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;}
.leg-dot{width:12px;height:12px;border-radius:3px;}

/* MODAL */
.modal-overlay{
  display:none;position:absolute;inset:0;
  background:rgba(0,0,0,.45);z-index:1000;
  align-items:center;justify-content:center;min-height:500px;
}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:12px;padding:26px 30px;min-width:340px;max-width:460px;width:90%;}
.modal h3{font-family:'DM Serif Display',serif;font-size:18px;color:var(--ceo);margin-bottom:16px;}
.modal label{display:block;font-size:11px;font-weight:700;color:#5F5E5A;margin-bottom:4px;letter-spacing:.05em;text-transform:uppercase;}
.modal input,.modal select{width:100%;border:1.5px solid #DDE2EE;border-radius:7px;padding:8px 11px;font-size:13px;font-family:'DM Sans',sans-serif;color:#1a2744;margin-bottom:12px;}
.modal input:focus,.modal select:focus{outline:none;border-color:var(--dept);}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
.mbtn{padding:8px 18px;border-radius:7px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:600;border:1.5px solid transparent;}
.mbtn-cancel{background:#f1f3f8;color:#444;border-color:#DDE2EE;}
.mbtn-save{background:var(--dept);color:#fff;}
.mbtn-save:hover{background:var(--dept-open);}
.mbtn-del{background:#FCEBEB;color:#A32D2D;border-color:#F7C1C1;margin-right:auto;}
.mbtn-del:hover{background:#F7C1C1;}

.exp-wrap{position:relative;}
.exp-menu{display:none;position:absolute;top:36px;right:0;background:#fff;border:1px solid #DDE2EE;border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.13);z-index:200;min-width:170px;overflow:hidden;}
.exp-menu.open{display:block;}
.exp-item{display:flex;align-items:center;gap:10px;padding:10px 15px;font-size:12px;color:#1a2744;cursor:pointer;border-bottom:1px solid #f0f3fa;}
.exp-item:last-child{border-bottom:none;}
.exp-item:hover{background:#E6F1FB;color:var(--dept);}
</style>
</head>

<div class="tb">
  <div class="tb-title"><span>EHL</span> Organizational Chart - Current/Proposed</div>
  <div class="tb-right">
    <button class="btn" onclick="expandAll()">⊞ Expand All</button>
    <button class="btn" onclick="collapseAll()">⊟ Collapse All</button>
    <button class="btn btn-green" onclick="openAddEmpModal()">+ Add Employee</button>
    <button class="btn" onclick="openAddDeptModal()">+ Add Department</button>
    <div class="exp-wrap">
      <button class="btn" onclick="toggleExp(event)">↓ Export ▾</button>
      <div class="exp-menu" id="expMenu">
        <div class="exp-item" onclick="exportJSON()">📄 Export JSON</div>
        <div class="exp-item" onclick="exportPDF()">🖨 Print / PDF</div>
        <div class="exp-item" onclick="exportPNG()">🖼 Export PNG</div>
      </div>
    </div>
  </div>
</div>

<div class="page" id="page">

  <!-- MODALS -->
  <div class="modal-overlay" id="empModal">
    <div class="modal">
      <h3 id="empModalTitle">Edit Employee</h3>
      <label>Full Name</label>
      <input type="text" id="empName" placeholder="First Last">
      <label>Designation</label>
      <input type="text" id="empDesig" placeholder="Job Title">
      <label>Department</label>

        <option>L6</option>
        <option>L5</option>
        <option>L4</option>
        <option>L3</option>
        <option>L2</option>
        <option>L1</option>
      </select>
      <div class="modal-footer">
        <button class="mbtn mbtn-del" id="empDelBtn" onclick="deleteEmployee()">Delete</button>
        <button class="mbtn mbtn-cancel" onclick="closeModal('empModal')">Cancel</button>
        <button class="mbtn mbtn-save" onclick="saveEmployee()">Save</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="deptModal">
    <div class="modal">
      <h3>Add Department</h3>
      <label>Department Name</label>
      <input type="text" id="newDeptName" placeholder="e.g. Legal">
      <div class="modal-footer">
        <button class="mbtn mbtn-cancel" onclick="closeModal('deptModal')">Cancel</button>
        <button class="mbtn mbtn-save" onclick="addDept()">Add</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="addEmpModal">
    <div class="modal">
      <h3>Add New Employee</h3>
      <label>Full Name</label>
      <input type="text" id="aeName" placeholder="First Last">
      <label>Designation</label>
      <input type="text" id="aeDesig" placeholder="Job Title">
      <label>Department</label>
      <select id="aeDept"></select>
      <label>Grade</label>
      <select id="aeGrade">
        <option>L10</option>
        <option>L9</option>
        <option>L8</option>
        <option>L7</option>
        <option>L6</option>
        <option>L5</option>
        <option>L4</option>
        <option>L3</option>
        <option>L2</option>
        <option>L1</option>

      <div class="modal-footer">
        <button class="mbtn mbtn-cancel" onclick="closeModal('addEmpModal')">Cancel</button>
        <button class="mbtn mbtn-save" onclick="saveNewEmp()">Add Employee</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="ceoModal">
    <div class="modal">
      <h3>Edit CEO</h3>
      <label>Full Name</label>
      <input type="text" id="ceoN">
      <label>Designation</label>
      <input type="text" id="ceoD">
      <div class="modal-footer">
        <button class="mbtn mbtn-cancel" onclick="closeModal('ceoModal')">Cancel</button>
        <button class="mbtn mbtn-save" onclick="saveCEO()">Save</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="qAddModal">
    <div class="modal">
      <h3 id="qAddTitle">Add Employee</h3>
      <label>Full Name</label>
      <input type="text" id="qName" placeholder="First Last">
      <label>Designation</label>
      <input type="text" id="qDesig" placeholder="Job Title">
      <div class="modal-footer">
        <button class="mbtn mbtn-cancel" onclick="closeModal('qAddModal')">Cancel</button>
        <button class="mbtn mbtn-save" onclick="saveQAdd()">Add</button>
      </div>
    </div>
  </div>
</div>

let editingEmp=null,qAddDept=null,qAddGrade=null;
function esc(s){return s.replace(/[^a-zA-Z0-9]/g,'_');}
function firstName(s){return s.split(' ')[0];}

function render(){
  renderDeptBoxes();
  renderGradeLabels();
  renderDeptPanels();
  renderLegend();
  populateSelects();
}

function renderDeptBoxes(){
  const row=document.getElementById('deptRow');
  row.innerHTML='';
  Object.keys(org.departments).forEach(d=>{
    const dept=org.departments[d];
    const k=esc(d);
    const typeClass = d.toLowerCase().includes('proposed')
    ? 'proposed'
    : 'current';
    const col=document.createElement('div');
    col.className='dept-col';
    col.innerHTML=`<div class="dept-vline"></div>
      <div class="dept-box ${typeClass}${dept.open?' open':''}" id="dbox-${k}" onclick="toggleDept('${k}')">
        <div class="dn">${d}</div>
        <div class="dc">${dept.employees.length} emp</div>
        <div class="chev">▼</div>
      </div>`;
    row.appendChild(col);
  });
}

function renderGradeLabels(){
  document.getElementById('gradeLabels').innerHTML=
    `<div class="grade-top-header"></div>` +
    GRADES.map(g =>
      `<div class="grade-label-cell gl${GC[g]}">${g}</div>`
    ).join('');
}

function renderDeptPanels(){
  const row=document.getElementById('deptPanelsRow');
  row.innerHTML='';
  const anyOpen=Object.values(org.departments).some(d=>d.open);
  document.getElementById('gridWrap').style.display=anyOpen?'flex':'none';
  Object.keys(org.departments).forEach(d=>{
    const dept=org.departments[d];
    const k=esc(d);
    const panel=document.createElement('div');
    panel.className='dept-panel'+(dept.open?' open':' closed');
    panel.id='panel-'+k;
    if(dept.open) panel.innerHTML=buildPanel(d);
    row.appendChild(panel);
  });
}

function buildPanel(deptName){
  const dept=org.departments[deptName];
  const k=esc(deptName);
  const byG={};
  GRADES.forEach(g=>byG[g]=[]);
  dept.employees.forEach((e,i)=>{if(byG[e.grade])byG[e.grade].push({...e,idx:i});});

  let html=`<div class="dept-panel-header">
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="dph-name">${deptName}</span>
      <span class="dph-cnt">${dept.employees.length} employees</span>
    </div>
    <button class="dph-close" onclick="toggleDept('${k}')">✕</button>
  </div>`;

  GRADES.forEach(g=>{
    const gc=GC[g];
    const emps=byG[g];
    html+=`<div class="dept-grade-row dg${gc}">`;
    if(emps.length===0){
      html+=`<div style="width:80px;min-width:80px;height:62px;border:1.5px dashed #ccc;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:10px;flex-shrink:0;">—</div>`;
    } else {
      emps.forEach(e=>{
        html+=`<div class="emp-card ec${gc}" onclick="editEmployee('${k}',${e.idx})" title="${e.name} — ${e.desig}">
          <div class="en">${firstName(e.name)}</div>
          <div class="ed">${e.desig}</div>
        </div>`;
      });
    }
    html+=`<button class="add-btn" onclick="quickAdd('${k}','${g}')" title="Add at ${g}">+</button>`;
    html+=`</div>`;
  });
  return html;
}

function renderLegend(){
  document.getElementById('legend').innerHTML=
    '<span style="font-size:11px;color:#888;margin-right:6px;">Grade colors:</span>'+
    GRADES.map(g=>`<div class="leg-item"><div class="leg-dot" style="background:${GCOL[g].bg};border:1.5px solid ${GCOL[g].bd};"></div><span style="color:${GCOL[g].tx};font-weight:600;">${g}</span></div>`).join('');
}

function populateSelects(){
  const depts=Object.keys(org.departments);
  ['empDept','aeDept'].forEach(id=>{
    const s=document.getElementById(id);
    if(!s)return;
    s.innerHTML=depts.map(d=>`<option value="${d}">${d}</option>`).join('');
  });
}

function findDept(k){return Object.keys(org.departments).find(d=>esc(d)===k);}

function toggleDept(k){
  const d=findDept(k);
  if(!d)return;
  org.departments[d].open=!org.departments[d].open;
  render();
}
function expandAll(){Object.keys(org.departments).forEach(d=>org.departments[d].open=true);render();}
function collapseAll(){Object.keys(org.departments).forEach(d=>org.departments[d].open=false);render();}

function editEmployee(k,idx){
  const d=findDept(k);
  const emp=org.departments[d].employees[idx];
  editingEmp={deptName:d,idx};
  document.getElementById('empModalTitle').textContent='Edit Employee';
  document.getElementById('empName').value=emp.name;
  document.getElementById('empDesig').value=emp.desig;
  document.getElementById('empGrade').value=emp.grade;
  document.getElementById('empDept').value=d;
  document.getElementById('empDelBtn').style.display='';
  document.getElementById('empModal').classList.add('open');
}

function saveEmployee(){
  const newDept=document.getElementById('empDept').value;
  const emp={name:document.getElementById('empName').value.trim(),desig:document.getElementById('empDesig').value.trim(),grade:document.getElementById('empGrade').value};
  if(!emp.name)return;
  if(!editingEmp){
    org.departments[newDept].employees.push(emp);
  } else {
    const {deptName,idx}=editingEmp;
    if(newDept===deptName){org.departments[deptName].employees[idx]=emp;}
    else{org.departments[deptName].employees.splice(idx,1);org.departments[newDept].employees.push(emp);org.departments[newDept].open=true;}
  }
  closeModal('empModal');render();
}

function deleteEmployee(){
  if(!editingEmp)return;
  const {deptName,idx}=editingEmp;
  org.departments[deptName].employees.splice(idx,1);
  closeModal('empModal');render();
}

function quickAdd(k,grade){
  qAddDept=findDept(k);qAddGrade=grade;
  document.getElementById('qAddTitle').textContent=`Add Employee — ${qAddDept} / ${grade}`;
  document.getElementById('qName').value='';document.getElementById('qDesig').value='';
  document.getElementById('qAddModal').classList.add('open');
}
function saveQAdd(){
  const name=document.getElementById('qName').value.trim();
  const desig=document.getElementById('qDesig').value.trim();
  if(!name||!qAddDept)return;
  org.departments[qAddDept].employees.push({name,desig,grade:qAddGrade});
  closeModal('qAddModal');render();
}

function openAddEmpModal(){
  editingEmp=null;
  document.getElementById('aeName').value='';document.getElementById('aeDesig').value='';
  document.getElementById('addEmpModal').classList.add('open');
}
function saveNewEmp(){
  const name=document.getElementById('aeName').value.trim();
  const desig=document.getElementById('aeDesig').value.trim();
  const dept=document.getElementById('aeDept').value;
  const grade=document.getElementById('aeGrade').value;
  if(!name||!dept)return;
  org.departments[dept].employees.push({name,desig,grade});
  org.departments[dept].open=true;
  closeModal('addEmpModal');render();
}

function openAddDeptModal(){document.getElementById('newDeptName').value='';document.getElementById('deptModal').classList.add('open');}
function addDept(){
  const n=document.getElementById('newDeptName').value.trim();
  if(!n||org.departments[n])return;
  org.departments[n]={open:false,employees:[]};
  closeModal('deptModal');render();
}

function editCEO(){
  document.getElementById('ceoN').value=document.getElementById('ceo-name').textContent;
  document.getElementById('ceoD').value=document.getElementById('ceo-desig').textContent;
  document.getElementById('ceoModal').classList.add('open');
}
function saveCEO(){
  document.getElementById('ceo-name').textContent=document.getElementById('ceoN').value;
  document.getElementById('ceo-desig').textContent=document.getElementById('ceoD').value;
  closeModal('ceoModal');
}

function closeModal(id){document.getElementById(id).classList.remove('open');editingEmp=null;}
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));

function toggleExp(e){e.stopPropagation();document.getElementById('expMenu').classList.toggle('open');}
document.addEventListener('click',()=>document.getElementById('expMenu').classList.remove('open'));

function exportJSON(){const b=new Blob([JSON.stringify(org,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='EHL_OrgData.json';a.click();}

function exportPNG(){
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
  s.onload=()=>{html2canvas(document.getElementById('page')).then(c=>{const a=document.createElement('a');a.download='EHL_OrgChart.png';a.href=c.toDataURL();a.click();});};
  document.head.appendChild(s);
}
